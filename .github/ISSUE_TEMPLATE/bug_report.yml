name: Bug report
description: Report a reproducible PulseRing problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it.
  - type: input
    id: version
    attributes:
      label: App version
      description: Example: 1.0.0
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows 10
        - Windows 11
        - macOS Apple Silicon
        - macOS Intel
        - Other
    validations:
      required: true
  - type: input
    id: artifact
    attributes:
      label: Installed artifact
      description: Example: PulseRing_1.0.0_x64-setup.exe
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps that trigger the issue.
      placeholder: |
        1. Start PulseRing
        2. Open settings
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove personal paths, tokens or private machine details before posting.
