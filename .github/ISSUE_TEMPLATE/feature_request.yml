name: Feature request
description: Suggest a focused improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform impact
      options:
        - Windows only
        - macOS only
        - Windows and macOS
        - Packaging or release only
        - Documentation only
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional, but helpful for product tradeoffs.
