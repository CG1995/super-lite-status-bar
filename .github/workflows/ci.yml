name: CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ci.yml"
      - "src-tauri/**"
      - "ui/**"
      - "tests/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/ci.yml"
      - "src-tauri/**"
      - "ui/**"
      - "tests/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Tests ──────────────────────────────────────────────────────────────

  rust-tests-windows:
    name: Rust tests (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - run: rustup default stable
      - run: cargo test

  rust-tests-macos:
    name: Rust tests (macOS)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
      - run: rustup default stable
      - run: cargo test

  # ── Windows Build ──────────────────────────────────────────────────────

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: rust-tests-windows
    steps:
      - uses: actions/checkout@v4
      - run: rustup default stable
      - name: Build portable exe
        run: cargo build --release
        working-directory: src-tauri
      - name: Prepare portable exe
        shell: pwsh
        run: |
          Copy-Item "src-tauri/target/release/pulsering.exe" "src-tauri/target/release/PulseRing_1.0.0_x64-portable.exe" -Force
      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: PulseRing-Windows-portable
          path: src-tauri/target/release/PulseRing_1.0.0_x64-portable.exe
          retention-days: 7
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build NSIS installer
        run: cargo tauri build --bundles nsis --no-sign --ci
        working-directory: src-tauri
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: PulseRing-Windows-NSIS-installer
          path: src-tauri/target/release/bundle/nsis/PulseRing_*_x64-setup.exe
          retention-days: 7

  # ── macOS Build ────────────────────────────────────────────────────────

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: rust-tests-macos
    steps:
      - uses: actions/checkout@v4
      - run: rustup default stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"
      - name: Build DMG
        run: cargo tauri build --bundles dmg --no-sign --ci
        working-directory: src-tauri
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: PulseRing-macOS-DMG
          path: src-tauri/target/release/bundle/dmg/PulseRing_*.dmg
          retention-days: 7
