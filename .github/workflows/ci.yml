name: CI

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/ci.yml"
      - "src-tauri/**"
      - "ui/**"
      - "tests/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/ci.yml"
      - "src-tauri/**"
      - "ui/**"
      - "tests/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust tests
    runs-on: windows-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use stable Rust
        run: rustup default stable

      - name: Cargo test
        run: cargo test
