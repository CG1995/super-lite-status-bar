name: macOS DMG Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dmg:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build DMG
        working-directory: src-tauri
        run: cargo tauri build --bundles dmg --no-sign --ci

      - name: Verify DMG
        run: |
          dmg_path=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)
          file "$dmg_path"
          hdiutil imageinfo "$dmg_path"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsering-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg
