name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows
            build_command: cargo tauri build --bundles nsis msi --no-sign --ci
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/PulseRing_*_x64-setup.exe
              src-tauri/target/release/bundle/msi/PulseRing_*_x64_en-US.msi
              src-tauri/target/release/PulseRing_*_x64-portable.exe
          - os: macos-14
            name: macOS
            build_command: cargo tauri build --bundles dmg --no-sign --ci
            artifact_paths: src-tauri/target/release/bundle/dmg/PulseRing_*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked --version "^2"

      - name: Build bundle
        working-directory: src-tauri
        run: ${{ matrix.build_command }}

      - name: Verify Windows outputs
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-ChildItem src-tauri\target\release\bundle\nsis\*.exe
          Get-ChildItem src-tauri\target\release\bundle\msi\*.msi
          Get-ChildItem src-tauri\target\release\PulseRing_*_x64-portable.exe

      - name: Verify macOS DMG
        if: runner.os == 'macOS'
        run: |
          dmg_path=$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)
          file "$dmg_path"
          hdiutil imageinfo "$dmg_path"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: pulsering-${{ matrix.name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ matrix.artifact_paths }}
